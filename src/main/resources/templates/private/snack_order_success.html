<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Thank u for order</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f5f0e6; /* светлый кофейный фон */
            color: #3b2f2f; /* тёмно-коричневый текст */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .success-container {
            text-align: center;
            background-color: #fff7f0;
            padding: 40px 60px;
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(59, 47, 47, 0.2);
        }

        .success-container h1 {
            color: #5c4033;
            font-size: 32px;
            margin-bottom: 20px;
        }

        .success-container p {
            font-size: 18px;
            margin-bottom: 30px;
        }

        .success-container a {
            text-decoration: none;
            padding: 12px 24px;
            background-color: #8b5e3c;
            color: #fffaf0;
            border-radius: 6px;
            font-size: 16px;
            transition: background-color 0.2s ease;
        }

        .success-container a:hover {
            background-color: #5c4033;
        }
    </style>
</head>
<body>
<div class="success-container">
    <h1>Thank you for order!</h1>


    <p style="font-weight: bold; font-size: 22px; color: #8b5e3c;">
        Price: <span th:text="${price}">0.00</span>
    </p>
    <p style="font-weight: bold; font-size: 22px; color: #8b5e3c;">
        Snack: <span th:text="${snack}">snack</span>
    </p>
    <p style="font-weight: bold; font-size: 22px; color: #8b5e3c;">
        Packing: <span th:text="${packing}">packing</span>
    </p>

    <a th:href="@{/}">Back to home</a>
</div>

</body>
</html>
