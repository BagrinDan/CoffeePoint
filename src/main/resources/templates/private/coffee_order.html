<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.w3.org/1999/xhtml">
    <head>
        <meta charset="UTF-8">
        <title>Coffee order</title>
        <style>
            /* Фон всей страницы — светлый кофейный */
            body {
                font-family: Arial, Helvetica, sans-serif;
                background-color: #f5f0e6; /* светло-бежевый */
                padding: 40px;
                color: #3b2f2f; /* тёмно-коричневый текст */
            }

            /* Контейнер формы */
            form {
                width: 420px;
                margin: 0 auto;
                background: #fff7f0; /* чуть светлее бежевого */
                padding: 24px;
                border-radius: 10px;
                box-shadow: 0 4px 12px rgba(59, 47, 47, 0.2); /* мягкая тень */
            }

            /* Заголовок */
            form h2 {
                margin: 0 0 20px 0;
                text-align: center;
                font-size: 24px;
                color: #5c4033; /* коричнево-шоколадный */
            }

            /* Лейблы */
            label {
                display: block;
                margin-top: 14px;
                font-size: 14px;
                font-weight: bold;
                color: #5c4033;
            }

            /* Поля ввода */
            select,
            input[type="number"] {
                width: 100%;
                margin-top: 6px;
                padding: 8px;
                font-size: 14px;
                border: 1px solid #d9bfae; /* светлый кофе */
                border-radius: 4px;
                background-color: #fff8f0;
                color: #3b2f2f;
            }

            /* Фокус */
            select:focus,
            input[type="number"]:focus {
                outline: none;
                border-color: #8b5e3c; /* насыщенный коричневый */
                box-shadow: 0 0 4px rgba(139, 94, 60, 0.5);
            }

            /* Группа чекбоксов */
            .checkbox-group {
                margin-top: 8px;
                padding-left: 4px;
            }

            .checkbox-group label {
                display: block;
                font-weight: normal;
                font-size: 14px;
                margin-top: 6px;
                cursor: pointer;
                color: #3b2f2f;
            }

            .checkbox-group input {
                margin-right: 6px;
            }


            button {
                margin-top: 24px;
                width: 100%;
                padding: 12px;
                background-color: #8b5e3c; /* насыщенный кофейный */
                color: #fffaf0;
                font-size: 16px;
                border: none;
                border-radius: 6px;
                cursor: pointer;
                transition: background-color 0.2s ease;
            }

            button:hover {
                background-color: #5c4033; /* темный шоколад */
            }

            input[type="number"]::-webkit-inner-spin-button,
            input[type="number"]::-webkit-outer-spin-button {
                -webkit-appearance: none;
                margin: 0;
    }

        </style>
    </head>

    <body>
    <form th:action="@{/coffee/create_order}" method="post">
        <label for="coffeeType">Coffee</label>
        <select name="coffeeType" id="coffeeType" required>
            <option value="AMERICANO">Americano</option>
            <option value="LATTE">Latte</option>
            <option value="ESPRESSO">Espresso</option>
        </select>

        <label>Condiments</label>
        <input type="checkbox" name="condimentEnum" value="MILK"> Milk
        <input type="checkbox" name="condimentEnum" value="SUGAR"> Sugar

        <button type="submit">Order</button>
    </form>
</body>
</html>
