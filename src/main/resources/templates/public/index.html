<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SOLIDCoffee</title>
    <link rel="stylesheet" href="/public/index.css">
</head>
<body>

<header class="header">
    <div class="logo">SOLIDCoffee</div>
    <nav class="nav">
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="#">Menu</a>
        </div>

        <div id="guest-zone" class="auth-zone">
            <a href="/public/auth" class="signup-btn">Login / SignUp</a>
        </div>

        <div id="user-zone" class="auth-zone hidden">
            <span id="username-display" class="user-name"></span>
            <form action="/public/logout" method="post" class="logout-form">
                <button type="submit" class="logout-btn">Logout</button>
            </form>
        </div>
    </nav>
</header>

<main class="main-content">
    <section class="hero">
        <h1>Let's drink coffee</h1>
        <p></p>
        <a href="/private/order">
            <button>Order coffee</button>
        </a>
        <p></p>
        <a href="/private/snack_order">
            <button>Order snack</button>
        </a>
    </section>
</main>


<button class="chat-toggle">💬</button>

<div class="chat-widget hidden">
    <div class="chat-header">
        <span>Chat</span>
        <button class="chat-close">✕</button>
    </div>

    <div class="chat-messages">
        <div class="message bot">Здравствуйте! Чем могу помочь?</div>
    </div>

    <div class="chat-input">
        <label>
            <input type="text" placeholder="Введите сообщение...">
        </label>
        <button>➤</button>
    </div>
</div>


<!-- JavaStriptiz -->

<!-- Auth -->
<script>
    document.addEventListener("DOMContentLoaded", async () => {
    const guestZone = document.getElementById("guest-zone");
    const userZone = document.getElementById("user-zone");
    const userNameSpan = document.getElementById("username-display");

    try {
        const response = await fetch('/api/user/getUsername');

        if (response.ok) {
            const user = await response.json();

            if (user && user.name) {
                userNameSpan.textContent = user.name;
                userZone.classList.remove("hidden");
                guestZone.classList.add("hidden");
            } else {
                showGuest();
            }
        } else {
            showGuest();
        }
    } catch (err) {
        showGuest();
    }

    function showGuest() {
        guestZone.classList.remove("hidden");
        userZone.classList.add("hidden");
    }
});
</script>


<script>
    async function apiCall(url) {
    const response = await fetch(url);

    if (response.status === 401) {
        console.warn("Сессия истекла или токена нет");
        window.location.href = "/login.html";
        return;
    }

    if (response.status === 403) {
        alert("Туда нельзя! Только для админов.");
        return;
    }

    return await response.json();
}
</script>

<!-- Chat -->
<script>
    const toggle = document.querySelector(".chat-toggle");
    const chat = document.querySelector(".chat-widget");
    const closeBtn = document.querySelector(".chat-close");

    toggle.addEventListener("click", () => {
        chat.classList.remove("hidden");
        toggle.style.display = "none";
    });

    closeBtn.addEventListener("click", () => {
        chat.classList.add("hidden");
        toggle.style.display = "block";
    });
</script>


<footer class="footer">
    <p>© 2026 CoffeePoint.</p>
</footer>

</body>
</html>
