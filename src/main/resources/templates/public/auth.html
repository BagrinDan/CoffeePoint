<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f0f0; display:flex; justify-content:center; align-items:center; height:100vh; }
        .login-container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.2); width: 300px; }
        input { width: 100%; padding: 0.5rem; margin-bottom: 1rem; border-radius:4px; border:1px solid #ccc; }
        button { width: 100%; padding: 0.5rem; border:none; border-radius:4px; background:#007bff; color:white; font-weight:bold; cursor:pointer; }
        button:hover { background:#0056b3; }
        .error { color:red; margin-bottom: 1rem; text-align:center; }
    </style>
</head>
<body>
<div class="login-container">
    <h2>Login</h2>

    <!-- Login form -->
    <form th:action="@{/api/auth/signin}" method="post">
        <label>
            <input type="text" name="username" placeholder="Username" required>
        </label>
        <label>
            <input type="password" name="password" placeholder="Password" required>
        </label>
        <button type="submit">Login</button>
    </form>

    <a href="register">Register</a>
    <a href="/">Back</a>

</div>
</body>

<!-- Auth script-->
<script>
    const form = document.querySelector('form');
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(form);

    const response = await fetch('/api/auth/signin', {
        method: 'POST',
        body: formData
    });

    if (response.ok) {
        window.location.href = '/';
    } else {
        alert('Auth error!');
    }
});
</script>

</html>
